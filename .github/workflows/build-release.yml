name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0). If empty, auto-increments the patch version of the latest release tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Determine Version
        id: get_version
        run: |
          git fetch --tags --force
          INPUT_VERSION="${{ github.event.inputs.version }}"
          
          if [ -n "$INPUT_VERSION" ]; then
            if [[ ! "$INPUT_VERSION" =~ ^v ]]; then
              TAG_VERSION="v$INPUT_VERSION"
            else
              TAG_VERSION="$INPUT_VERSION"
            fi
            VERSION_NUM="${TAG_VERSION#v}"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "Latest tag found: $LATEST_TAG"
            CLEAN_TAG="${LATEST_TAG#v}"
            IFS='.' read -r major minor patch <<< "$CLEAN_TAG"
            if [[ "$major" =~ ^[0-9]+$ ]] && [[ "$minor" =~ ^[0-9]+$ ]] && [[ "$patch" =~ ^[0-9]+$ ]]; then
              next_patch=$((patch + 1))
              VERSION_NUM="$major.$minor.$next_patch"
              TAG_VERSION="v$VERSION_NUM"
            else
              VERSION_NUM="0.1.0"
              TAG_VERSION="v0.1.0"
            fi
          fi
          
          echo "Determined Version: $VERSION_NUM"
          echo "Determined Tag: $TAG_VERSION"
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Create and Push Git Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.get_version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG" --force

  build:
    name: Build & Publish for ${{ matrix.runtime }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runtime: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Publish Binaries
        run: |
          dotnet publish NyxAssetsEditor.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -p:Version=${{ needs.prepare.outputs.version }} -o publish/${{ matrix.runtime }}

      - name: Archive Release Assets (Windows)
        if: matrix.runtime == 'win-x64'
        run: |
          cd publish/win-x64
          zip -r ../../NyxAssetsEditor-win-x64.zip .

      - name: Archive Release Assets (Linux)
        if: matrix.runtime == 'linux-x64'
        run: |
          cd publish/linux-x64
          tar -czvf ../../NyxAssetsEditor-linux-x64.tar.gz .

      - name: Archive Release Assets (macOS x64)
        if: matrix.runtime == 'osx-x64'
        run: |
          cd publish/osx-x64
          zip -r ../../NyxAssetsEditor-osx-x64.zip .

      - name: Archive Release Assets (macOS ARM64)
        if: matrix.runtime == 'osx-arm64'
        run: |
          cd publish/osx-arm64
          zip -r ../../NyxAssetsEditor-osx-arm64.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NyxAssetsEditor-${{ matrix.runtime }}
          path: |
            NyxAssetsEditor-*.zip
            NyxAssetsEditor-*.tar.gz

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move Assets to Flat Directory
        run: |
          mkdir release_assets
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release_assets/ \;
          ls -R release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
